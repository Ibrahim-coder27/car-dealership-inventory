<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Glass Card Container -->
  <g transform="translate(380, 40)">
    <rect width="440" height="550" rx="24" fill="#ffffff" fill-opacity="0.88" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2" />
    
    <!-- Logo Icon -->
    <rect x="188" y="20" width="64" height="64" rx="16" fill="#4f46e5" />
    <circle cx="220" cy="45" r="10" fill="#ffffff" />
    <path d="M205 60 C205 53 235 53 235 60 Z" fill="#ffffff" />

    <text x="220" y="105" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#0f172a" text-anchor="middle">AutoVault</text>
    <text x="220" y="125" font-family="Inter, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Car Dealership Inventory System</text>

    <text x="220" y="165" font-family="Inter, sans-serif" font-weight="800" font-size="22" fill="#0f172a" text-anchor="middle">Register</text>

    <!-- Name Field -->
    <text x="40" y="200" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="#64748b" letter-spacing="1">FULL NAME</text>
    <rect x="40" y="208" width="360" height="38" rx="10" fill="#ffffff" stroke="#cbd5e1" />
    <text x="55" y="232" font-family="Inter, sans-serif" font-size="13" fill="#0f172a">John Doe</text>

    <!-- Email Field -->
    <text x="40" y="266" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="#64748b" letter-spacing="1">EMAIL ADDRESS</text>
    <rect x="40" y="274" width="360" height="38" rx="10" fill="#ffffff" stroke="#cbd5e1" />
    <text x="55" y="298" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">you@example.com</text>

    <!-- Password Field -->
    <text x="40" y="332" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="#64748b" letter-spacing="1">PASSWORD</text>
    <rect x="40" y="340" width="360" height="38" rx="10" fill="#ffffff" stroke="#cbd5e1" />
    <text x="55" y="364" font-family="Inter, sans-serif" font-size="14" fill="#0f172a">••••••••</text>
    <text x="375" y="364" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#64748b" text-anchor="end">Show</text>

    <!-- Confirm Password Field -->
    <text x="40" y="398" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="#64748b" letter-spacing="1">CONFIRM PASSWORD</text>
    <rect x="40" y="406" width="360" height="38" rx="10" fill="#ffffff" stroke="#cbd5e1" />
    <text x="55" y="430" font-family="Inter, sans-serif" font-size="14" fill="#0f172a">••••••••</text>

    <!-- Role Dropdown -->
    <text x="40" y="464" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="#64748b" letter-spacing="1">ACCOUNT ROLE</text>
    <rect x="40" y="472" width="360" height="38" rx="10" fill="#ffffff" stroke="#cbd5e1" />
    <text x="55" y="496" font-family="Inter, sans-serif" font-size="13" fill="#0f172a">Customer (Standard User)</text>

    <!-- Submit Button -->
    <rect x="40" y="520" width="360" height="40" rx="10" fill="#4f46e5" />
    <text x="220" y="545" font-family="Inter, sans-serif" font-weight="700" font-size="14" fill="#ffffff" text-anchor="middle">Register</text>
  </g>
</svg>
