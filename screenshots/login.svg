<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Glass Card Container -->
  <g transform="translate(380, 80)">
    <rect width="440" height="470" rx="24" fill="#ffffff" fill-opacity="0.88" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2" />
    
    <!-- Logo Icon -->
    <rect x="188" y="30" width="64" height="64" rx="16" fill="#4f46e5" />
    <path d="M210 55 L230 55 L230 65 L210 65 Z" fill="#ffffff" />
    <circle cx="215" cy="70" r="5" fill="#ffffff" />
    <circle cx="225" cy="70" r="5" fill="#ffffff" />

    <text x="220" y="125" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#0f172a" text-anchor="middle">AutoVault</text>
    <text x="220" y="145" font-family="Inter, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Car Dealership Inventory System</text>

    <text x="220" y="195" font-family="Inter, sans-serif" font-weight="800" font-size="22" fill="#0f172a" text-anchor="middle">Login</text>
    <text x="220" y="215" font-family="Inter, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Sign in to access your inventory portal</text>

    <!-- Email Field -->
    <text x="40" y="255" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#64748b" letter-spacing="1">EMAIL ADDRESS</text>
    <rect x="40" y="265" width="360" height="44" rx="12" fill="#ffffff" stroke="#cbd5e1" />
    <text x="55" y="292" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">you@example.com</text>

    <!-- Password Field -->
    <text x="40" y="335" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#64748b" letter-spacing="1">PASSWORD</text>
    <rect x="40" y="345" width="360" height="44" rx="12" fill="#ffffff" stroke="#cbd5e1" />
    <text x="55" y="372" font-family="Inter, sans-serif" font-size="16" fill="#0f172a">••••••••</text>
    <text x="375" y="372" font-family="Inter, sans-serif" font-weight="600" font-size="12" fill="#64748b" text-anchor="end">Show</text>

    <!-- Submit Button -->
    <rect x="40" y="410" width="360" height="44" rx="12" fill="#4f46e5" />
    <text x="220" y="437" font-family="Inter, sans-serif" font-weight="700" font-size="15" fill="#ffffff" text-anchor="middle">Login</text>
  </g>
</svg>
